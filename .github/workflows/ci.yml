name: ci

on:
  push:
    branches: ["main"]
  pull_request:

env:
  APP_VERSION: 0.0.1

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate API syntax
        working-directory: apps/api
        run: |
          python -m pip install -r requirements.txt
          python -m py_compile main.py

      - name: Validate worker syntax
        working-directory: apps/worker
        run: |
          python -m pip install -r requirements.txt
          python -m py_compile worker.py

      - name: Build web
        working-directory: apps/web
        run: |
          npm ci
          npm run build

  # Pushes to Docker Hub. Create repos clara-api, clara-worker, clara-web under your
  # account (or rely on auto-create on first push). Set DOCKERHUB_USERNAME +
  # DOCKERHUB_TOKEN (access token) in repo secrets. Must match infra/k8s/kustomization.yaml images.
  # Job-level `if` cannot use `secrets` (GitHub restriction). Gate Docker steps below instead.
  build-images:
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -z "$DOCKERHUB_USERNAME" ] || [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "Docker Hub secrets are missing; skipping image publish."
            exit 0
          fi
          echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

      - name: Build and push images
        env:
          NS: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          SHA_TAG: ${{ github.sha }}
        run: |
          if [ -z "$NS" ] || [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "Docker Hub secrets are missing; skipping image publish."
            exit 0
          fi
          docker build -t "$NS/clara-api:${APP_VERSION}" apps/api
          docker build -t "$NS/clara-worker:${APP_VERSION}" apps/worker
          docker build -t "$NS/clara-web:${APP_VERSION}" apps/web
          docker tag "$NS/clara-api:${APP_VERSION}" "$NS/clara-api:${SHA_TAG}"
          docker tag "$NS/clara-worker:${APP_VERSION}" "$NS/clara-worker:${SHA_TAG}"
          docker tag "$NS/clara-web:${APP_VERSION}" "$NS/clara-web:${SHA_TAG}"
          docker push "$NS/clara-api:${APP_VERSION}"
          docker push "$NS/clara-worker:${APP_VERSION}"
          docker push "$NS/clara-web:${APP_VERSION}"
          docker push "$NS/clara-api:${SHA_TAG}"
          docker push "$NS/clara-worker:${SHA_TAG}"
          docker push "$NS/clara-web:${SHA_TAG}"
