apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - configmap.yaml
  - demo-banner.yaml
  - generated-audio-pvc.yaml
  - postgres.yaml
  - redis.yaml
  - api.yaml
  - worker.yaml
  - web.yaml
  - cronjob.yaml
# Must match GitHub Actions secret DOCKERHUB_USERNAME (Docker Hub namespace).
images:
  - name: clara-api
    newName: docker.io/aadisharma/clara-api
    newTag: "0.0.1"
  - name: clara-worker
    newName: docker.io/aadisharma/clara-worker
    newTag: "0.0.1"
  - name: clara-web
    newName: docker.io/aadisharma/clara-web
    newTag: "0.0.1"
